<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrrrim</title>
    <link rel="icon" href="assets/logos/favicon.ico">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/base.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Russo+One&display=swap"
        rel="stylesheet">
</head>

<body>
    <div>
        <img src="assets/logos/logo.png" alt="vrrrim logo" class="logo" height="50px">
    </div>

    <div id="testing">
        <h1 style="color: #00D4FF; margin-bottom: 20px;">Choose Your Ride</h1>
        <label style="color: #79838c; font-family: 'Barlow', sans-serif; display: block; text-align: center;">Racing
            as</label>
        <h2>
            {% if current_user.is_authenticated %}
            {{ current_user.username }}
            {% else %}
            Guest 
            {% endif %}
        </h2>

        <div id="choose-avatar">
            <div id="avatars">
                <img src="assets/logos/avatar.png" class="avatar" id="default-avatar" alt="Default Avatar"> 
            </div>
            <div id="color-picker">
                <label style="color: #F5F0E8; font-family: 'Barlow', sans-serif; 
                display: block; text-align: left; margin-bottom: 10px;">Car Colour</label>
                
                <!-- Color Swatches -->
                <div id="swatches">
                    <button class="swatch active" 
                        data-color="brightness(0) saturate(100%) invert(55%) sepia(51%) saturate(3077%) hue-rotate(164deg) brightness(105%) contrast(108%)" 
                        data-hex="#00BFFF"
                        data-name="Neon Cyan"
                        style="background:#00BFFF;"></button>

                    <button class="swatch" 
                        data-color="brightness(0) saturate(100%) invert(57%) sepia(38%) saturate(6145%) hue-rotate(343deg) brightness(107%) contrast(101%)" 
                        data-hex="#FF6B2B"
                        data-name="Orange"
                        style="background:#FF6B2B;"></button>

                    <button class="swatch" 
                        data-color="brightness(0) saturate(100%) invert(63%) sepia(99%) saturate(987%) hue-rotate(1deg) brightness(104%) contrast(103%)" 
                        data-hex="#FFB800"
                        data-name="Yellow"
                        style="background:#FFB800;"></button>

                    <button class="swatch" 
                        data-color="brightness(0) saturate(100%) invert(25%) sepia(60%) saturate(5799%) hue-rotate(256deg) brightness(97%) contrast(92%)" 
                        data-hex="#7C3AED"
                        data-name="Purple"
                        style="background:#7C3AED;"></button>

                    <button class="swatch" 
                        data-color="brightness(0) saturate(100%) invert(60%) sepia(99%) saturate(2226%) hue-rotate(136deg) brightness(100%) contrast(101%)" 
                        data-hex="#00CEC9"
                        data-name="Teal"
                        style="background:#00CEC9;"></button>

                    <button class="swatch" 
                        data-color="brightness(0) saturate(100%) invert(38%) sepia(67%) saturate(2243%) hue-rotate(307deg) brightness(95%) contrast(91%)"
                        data-hex="#E84393"
                        data-name="Pink"
                        style="background:#E84393;"></button>

                    <button class="swatch" 
                        data-color="brightness(0) saturate(100%) invert(63%) sepia(100%) saturate(362%) hue-rotate(42deg) brightness(95%) contrast(97%)" 
                        data-hex="#7ED321"
                        data-name="Lime"
                        style="background:#7ED321;"></button>

                    <button class="swatch" 
                        data-color="brightness(0) saturate(100%) invert(32%) sepia(73%) saturate(4782%) hue-rotate(341deg) brightness(105%) contrast(82%)" 
                        data-hex="#E8404A"
                        data-name="Red"
                        style="background:#E8404A;"></button>
                </div>
                <p id="color-name">Neon Cyan</p>
            </div>
        </div>

        <div id="action-buttons">
            <!-- Default colours set to white -->
            <form action="{{ url_for('index') }}" method="POST">
                <input type="hidden" name="clicked" value="play">
                <input type="hidden" name="car_color" id="car_color_input_play" value="#F5F0E8">
                <input type="hidden" name="car_filter" id="car_filter_input_play" value="brightness(100)">
                <button type="submit" id="btn-play">Play</button>
            </form>
            <form action="{{ url_for('index') }}" method="POST">
                <input type="hidden" name="clicked" value="private">
                <input type="hidden" name="car_color" id="car_color_input_private" value="#F5F0E8">
                <input type="hidden" name="car_filter" id="car_filter_input_private" value="brightness(100)">
                <button type="submit" id="btn-private">Create private room</button>
            </form>
        </div>
        <div class="hr"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        <!-- JavaScript for avatar color selection -->
        document.querySelectorAll('.swatch').forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                document.getElementById('default-avatar').style.filter = swatch.dataset.color;
                document.getElementById('color-name').textContent = swatch.dataset.name;

                document.getElementById('car_color_input_play').value = swatch.dataset.hex;
                document.getElementById('car_color_input_private').value = swatch.dataset.hex;

                document.getElementById('car_filter_input_play').value = swatch.dataset.color;
                document.getElementById('car_filter_input_private').value = swatch.dataset.color;
            });
        });
    </script>
    <script>
        document.querySelectorAll('#table a').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('#table a').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
    </script>

</body>

</html>
