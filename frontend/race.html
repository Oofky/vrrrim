<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrrrim</title>
    <link rel="icon" href="assets/logos/favicon.ico">

    <link href="css/base.css" rel="stylesheet">

    <script type="module">
        import { MergeView } from "https://esm.sh/@codemirror/merge"
        import { EditorView, basicSetup } from "https://esm.sh/codemirror@6.0.2"
        import { EditorState, Compartment } from "https://esm.sh/@codemirror/state"
        import { keymap } from "https://esm.sh/@codemirror/view"
        import { indentWithTab } from "https://esm.sh/@codemirror/commands"
        import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark@6.1.3";
        import { vim } from "https://esm.sh/@replit/codemirror-vim"
        import { diff_match_patch } from "https://esm.sh/diff-match-patch"

        let start_doc = ""
        let result_doc = `function greet(name) {
    console.log("Hello, " + name + "!");
}`

        const editableComp = new Compartment();
        const readOnlyComp = new Compartment();

        const dmp = new diff_match_patch();
        const maxDist = dmp.diff_levenshtein(dmp.diff_main(start_doc, result_doc));

        let view = new MergeView({
            a: {
                doc: start_doc,
                extensions: [
                    vim(),
                    keymap.of([indentWithTab]),
                    basicSetup,
                    editableComp.of(EditorView.editable.of(false)),
                    readOnlyComp.of(EditorState.readOnly.of(true)),
                    EditorView.theme({
                        ".cm-cursor, .cm-dropCursor": {
                            "border-left-color": "#F5F0E8"
                        }
                    })
                ]
            },
            b: {
                doc: result_doc,
                extensions: [
                    basicSetup,
                    EditorView.editable.of(false),
                    EditorState.readOnly.of(true),
                    EditorView.theme({
                        ".cm-content": {
                            "-webkit-user-select": "none",
                            "-ms-user-select": "none",
                            "user-select": "none"
                        }
                    })
                ]
            },
            parent: document.getElementById("code-mirror-editor")
        })

        document.getElementById('startButton').addEventListener('click', () => {
            // Set left editor to be editable by player
            view.a.dispatch({
                effects: [
                    editableComp.reconfigure(EditorView.editable.of(true)),
                    readOnlyComp.reconfigure(EditorState.readOnly.of(false))
                ]
            });
            // Start calculating progress
            calcProgressLoop();
        });

        function calcProgressLoop() {
            const diffs = dmp.diff_main(view.a.state.doc.toString(), result_doc);
            const dist = dmp.diff_levenshtein(diffs);
            const progress = Math.max(0, Math.floor((maxDist - dist) / maxDist * 100));

            document.getElementById('progressBar').value = progress;
            //TODO: Should send this data to server as well, so server can send to other players

            if (progress >= 100) {
                // document.getElementById('progressBar').value = 100;
                setTimeout(() => {
                    alert("You win!");
                    location.href = '{{ url_for("index") }}';
                }, 100);
            } else {
                setTimeout(calcProgressLoop, 200);
            }
        }
    </script>
</head>
<!-- TODO: Add countdown -->

<body>
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 0px 32px; margin: 0 auto;">
        <span>
            <!-- Vrrrim Logo -->
            <img src="assets/logos/logo.png" alt="vrrrim logo" style="height: 50px; cursor: pointer;">
        </span>
        <div style="display: flex; align-items: center; gap: 20px;">
            <!-- TODO: Implement Vim cheatsheet -->
            <button style="background: transparent; border: 1px solid #F5F0E8; color: #F5F0E8;
                       padding: 8px 18px; font-family: 'Barlow', sans-serif; cursor: pointer;">Vim Cheatsheet</button>
        </div>
    </nav>

    <span style="color: #79838c; font-family: 'Barlow', sans-serif; font-size: 15px; text-align: center; 
                display: block; margin: 18px 0px 0px 0px;">
        Room code: <span style="color: #FFB800;">{{ code }}</span>
    </span>

    <!-- Buttons -->
    <div style="display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 32px 20px 32px;">
        <button id="startButton">▶ Start</button>
        <button id="copyButton">Copy invite link</button>
    </div>

    <div id="editor-wrapper" style="display: flex; flex-direction: column; margin: 16px 32px;">

        <!-- Vim terminals' headers -->
        <div style="display: flex;">
            <div style="flex: 1; background: #1C2128; border: 1px solid #30363D; border-bottom: none;
                    padding: 6px 12px; display: flex; justify-content: space-between;">
                <span style="color: #F5F0E8; font-family: 'Barlow', sans-serif;">Your Terminal</span>
            </div>
            <div style="flex: 1; background: #1C2128; border: 1px solid #30363D; border-bottom: none; border-left: none;
                    padding: 6px 12px; display: flex; justify-content: space-between;">
                <span style="color: #F5F0E8; font-family: 'Barlow', sans-serif;">Target Code</span>
            </div>
        </div>

        <!-- CodeMirror MergeView Vim terminals-->
        <div id="code-mirror-editor"></div>

        <!-- Panel Footers -->
        <div style="display: flex;">
            <div style="flex: 1; background: #1C2128; border: 1px solid #30363D; border-top: none;
                    padding: 4px 12px; display: flex; justify-content: space-between;">
                <!-- <span style="color: #8B949E; font-family: 'Barlow', sans-serif; font-size: 12px;">Line 1, Col 1</span>
                <span style="color: #8B949E; font-family: 'Barlow', sans-serif; font-size: 12px;">0% Complete</span> -->
            </div>
            <div style="flex: 1; background: #1C2128; border: 1px solid #30363D; border-top: none; border-left: none;
                    padding: 4px 12px; display: flex; justify-content: space-between;">
                <span style="color: #8B949E; font-family: 'Barlow', sans-serif; font-size: 12px;">3 lines</span>
                <span style="color: #8B949E; font-family: 'Barlow', sans-serif; font-size: 12px;">67 characters</span>
            </div>
        </div>
    </div>

    <label for="progressBar" style="color: #F5F0E8; font-family: 'Barlow', sans-serif;">Your progress: </label>
    <progress id="progressBar" value="0" max="100"></progress>

    <!-- JavaScript for copying invite link to clipboard -->
    <script type="text/javascript">
        document.getElementById('copyButton').addEventListener('click', () => {
            navigator.clipboard.writeText(
                '{{ url_for("index", _external=True) }}' + '?' + '{{ code }}'
            );
        });
    </script>

</body>

</html>
