<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrrrim</title>
    <link href="css/base.css" rel="stylesheet">
    <script type="module">
        // import { EditorView, basicSetup } from "https://esm.sh/codemirror@6.0.2";
        // import { javascript } from "https://esm.sh/@codemirror/lang-javascript@6.2.4";

        // // optional theme
        // import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark@6.1.3";

        // window.mirrorEditor = new EditorView({
        //     parent: document.getElementById("code-mirror-editor"),
        //     doc: 'console.log("Hello, World!");',
        //     extensions: [basicSetup, javascript(), oneDark],
        // });

        // features included in basicSetup:
        // https://codemirror.net/examples/basic/

        // get the current code: mirrorEditor.state.doc.toString();

        import { MergeView } from "https://esm.sh/@codemirror/merge"
        import { EditorView, basicSetup } from "https://esm.sh/codemirror@6.0.2"
        import { EditorState, Compartment } from "https://esm.sh/@codemirror/state"
        import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark@6.1.3";
        import { diff_match_patch } from "https://esm.sh/diff-match-patch"

        let start_doc = "c"
        let result_doc = `class PostcardFile {
        private final Postcard postcard;
        public Postcard(Postcard postcard) {
        this.postcard = postcard;
        }
        }
        `
        const editableComp = new Compartment();
        const readOnlyComp = new Compartment();

        const dmp = new diff_match_patch();
        const maxDist = dmp.diff_levenshtein(dmp.diff_main(start_doc, result_doc));

        let view = new MergeView({
            a: {
                doc: start_doc,
                extensions: [
                    basicSetup,
                    editableComp.of(EditorView.editable.of(false)),
                    readOnlyComp.of(EditorState.readOnly.of(true)),
                ]
            },
            b: {
                doc: result_doc,
                extensions: [
                    basicSetup,
                    EditorView.editable.of(false),
                    EditorState.readOnly.of(true),
                    EditorView.theme({
                        ".cm-content": {
                            "-webkit-user-select": "none",
                            "-ms-user-select": "none",
                            "user-select": "none"
                        }
                    })
                ]
            },
            parent: document.getElementById("code-mirror-editor")
        })

        document.getElementById('startButton').addEventListener('click', () => {
            // Set left editor to be editable by player
            view.a.dispatch({
                effects: [
                    editableComp.reconfigure(EditorView.editable.of(true)),
                    readOnlyComp.reconfigure(EditorState.readOnly.of(false))
                ]
            });
            // Start calculating progress
            calcProgressLoop();
        });

        function calcProgressLoop() {
            const diffs = dmp.diff_main(view.a.state.doc.toString(), result_doc);
            const dist = dmp.diff_levenshtein(diffs);
            const progress = Math.max(0, Math.floor((maxDist - dist) / maxDist * 100));
            
            document.getElementById('progressBar').value = progress;
            //TODO: Should send this data to server as well, so server can send to other players

            if (progress >= 100) {
                alert("You win!");
                location.href='{{ url_for("index") }}';
            } else {
                setTimeout(calcProgressLoop, 1000);
            }
        }
    </script>
</head>

<body>
    <h1>vrrrim</h1>

    <p>Room code (for debug only): {{ code }}</p>
    <button id="copyButton">Copy invite link</button>
    <script type="text/javascript">
        document.getElementById('copyButton').addEventListener('click', () => {
            navigator.clipboard.writeText(
                '{{ url_for("index", _external=True) }}' + '?' + '{{ code }}'
            );
        });
    </script>

    <button id="startButton">Start</button>
    <label for="progressBar">Your progress: </label>
    <progress id="progressBar" value="0" max="100"></progress>

    <div id="code-mirror-editor"></div>
</body>

</html>
